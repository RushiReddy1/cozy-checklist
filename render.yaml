services:
  - type: web
    name: mini-todo-api
    runtime: go
    rootDir: backend
    buildCommand: go build -o app .
    startCommand: ./app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mini-todo-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://mini-todo-frontend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://mini-todo-frontend.onrender.com

  - type: web
    name: mini-todo-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://mini-todo-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: mini-todo-db
